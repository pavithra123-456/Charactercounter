<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Character Counter</h2>

        <p>200 characters max</p>

        <textarea id="message" placeholder="Type your message..." maxlength="200"></textarea>

        <p id="counter">0/200 characters (200 remaining)</p>

        <p id="warning"></p>
    </div>

    <script src="script.js"></script>

</body>
</html>
